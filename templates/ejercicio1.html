<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Formulario de Notas</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <div class="form-container">
        <h2>Formulario de Notas</h2>

        <form method="POST">
            <label>Nota 1 (1.0 - 7.0):</label>
            <input type="number" name="nota1" min="1.0" max="7.0" step="0.1" required>

            <label>Nota 2 (1.0 - 7.0):</label>
            <input type="number" name="nota2" min="1.0" max="7.0" step="0.1" required>

            <label>Nota 3 (1.0 - 7.0):</label>
            <input type="number" name="nota3" min="1.0" max="7.0" step="0.1" required>

            <label>Asistencia (%) [Mín. 75%]:</label>
            <input type="number" name="asistencia" min="0" max="100" required>

            <button type="submit" class="btn-submit">CALCULAR STATUS</button>
        </form>

        {% if estado %}
            <div class="resultados">
                <p>PROMEDIO: <strong>{{ promedio }}</strong></p>
                <p>ESTADO: <strong>{{ estado }}</strong></p>

                </div>
        {% endif %}

        <br>
        <a href="/" class="btn" style="font-size: 0.6rem; padding: 10px;">VOLVER AL MENÚ</a>
    </div>
</body>
</html>
